name: build

on:
  workflow_call:
    inputs:
      deploy:
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      deploy:
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: joinframework/join-ci:latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: hugo --minify

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: join-www
          path: public/

      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.JOIN_DEPLOY_KNOWN_HOST }}" >> ~/.ssh/known_hosts
          eval $(ssh-agent)
          echo "${{ secrets.JOIN_DEPLOY_KEY }}" | ssh-add -
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.JOIN_DEPLOY_PORT }}" \
            public/ ${{ secrets.JOIN_DEPLOY_DEST }}
